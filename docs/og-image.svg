<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Bleepforge — Schema-driven content authoring studio for Godot 4 / .NET</title>

  <defs>
    <radialGradient id="bg-halo" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Canvas + halo. Same #0a0a0a base as the site (matched in
       client/index.html and the splash) so the social-card visual reads
       continuous with the actual app when users land. -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#bg-halo)"/>

  <!-- Speech-bubble icon, 5x scale of the 64×64 source (so 320×320 at
       output). Integer scale preserves pixel-grid alignment exactly —
       every source rect lands on an integer multiple of 5 output pixels.
       Centered horizontally; positioned in the upper portion so the
       wordmark + tagline sit naturally below. -->
  <g shape-rendering="crispEdges" transform="translate(440, 60) scale(5)">
    <!-- Speech bubble outline -->
    <rect x="8" y="12" width="48" height="4" fill="#34d399"/>
    <rect x="8" y="40" width="48" height="4" fill="#34d399"/>
    <rect x="8" y="16" width="4" height="24" fill="#34d399"/>
    <rect x="52" y="16" width="4" height="24" fill="#34d399"/>

    <!-- Top-left highlight + bottom-right shadow corners -->
    <rect x="8" y="12" width="4" height="4" fill="#6ee7b7"/>
    <rect x="52" y="40" width="4" height="4" fill="#059669"/>

    <!-- Tail (5-rung pixel stair, bottom-left) -->
    <rect x="12" y="44" width="20" height="4" fill="#34d399"/>
    <rect x="12" y="48" width="16" height="4" fill="#34d399"/>
    <rect x="12" y="52" width="12" height="4" fill="#34d399"/>
    <rect x="12" y="56" width="8" height="4" fill="#34d399"/>
    <rect x="12" y="60" width="4" height="4" fill="#34d399"/>

    <!-- The bleep — bright accent at the bubble's visual center -->
    <rect x="30" y="26" width="4" height="4" fill="#6ee7b7"/>
  </g>

  <!-- Wordmark. Bold monospace for the closest-to-pixel feel without
       depending on Press Start 2P being installed where the SVG is
       rendered (it isn't, on the build machine). Letter-spacing widens
       to give the wordmark presence. -->
  <text
    x="600"
    y="490"
    text-anchor="middle"
    font-family="'Noto Sans Mono', 'Courier New', monospace"
    font-weight="700"
    font-size="80"
    letter-spacing="6"
    fill="#34d399"
  >BLEEPFORGE</text>

  <!-- Tagline -->
  <text
    x="600"
    y="560"
    text-anchor="middle"
    font-family="'Noto Sans Mono', 'Courier New', monospace"
    font-size="26"
    fill="#a3a3a3"
  >Schema-driven content authoring for Godot 4 / .NET</text>
</svg>
